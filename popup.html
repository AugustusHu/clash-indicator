<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 340px;
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: #1f2937;
    background: #fff;
  }
  .header { padding: 14px 16px 12px; border-bottom: 1px solid #e5e7eb; }
  .toprow { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #host { font-weight: 600; font-size: 14px; word-break: break-all; }
  #verdict {
    padding: 3px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  #verdict.direct { background: #dcfce7; color: #166534; }
  #verdict.proxy { background: #dbeafe; color: #1e40af; }
  #verdict.unknown { background: #f3f4f6; color: #6b7280; }
  #verdict.error { background: #fee2e2; color: #991b1b; }
  .meta { margin-top: 8px; display: flex; align-items: center; gap: 6px; color: #6b7280; font-size: 12px; }
  .meta .right { margin-left: auto; }
  .delay-ok { color: #16a34a; }
  .delay-bad { color: #d97706; }
  .section { padding: 12px 16px; }
  .sec-head { display: flex; justify-content: space-between; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: #f3f4f6; margin-bottom: 10px; }
  .bar .p { background: #2563eb; }
  .bar .d { background: #16a34a; }
  .bar .u { background: #d1d5db; }
  .dom-list { max-height: 180px; overflow-y: auto; }
  .dom {
    display: flex; justify-content: space-between; gap: 10px;
    padding: 3px 0; font-size: 12px; color: #4b5563;
  }
  .dom .h { word-break: break-all; }
  .dom .o { white-space: nowrap; }
  .dom .o.direct { color: #16a34a; }
  .dom .o.proxy { color: #2563eb; }
  .dom .o.unknown { color: #9ca3af; }
  .switch-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  select {
    flex: 1; padding: 5px 6px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 12px; background: #fff; min-width: 0;
  }
  .footer { padding: 10px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; }
  button {
    flex: 1; padding: 6px 0; border: 1px solid #d1d5db; background: #fff;
    border-radius: 6px; cursor: pointer; font-size: 12px; color: #1f2937;
  }
  button:hover { background: #f3f4f6; }
  button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
  button.primary:hover { background: #1d4ed8; }
  details { padding: 0 16px 12px; }
  summary { cursor: pointer; color: #6b7280; font-size: 12px; padding-top: 8px; }
  .settings label { display: block; margin: 6px 0 2px; color: #4b5563; font-size: 12px; }
  .settings input {
    width: 100%; box-sizing: border-box; padding: 5px 8px;
    border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px;
  }
  .btns { margin-top: 8px; display: flex; gap: 8px; }
  #msg { margin-top: 6px; font-size: 12px; min-height: 16px; }
  #msg.ok { color: #16a34a; }
  #msg.err { color: #dc2626; }
  .hint { color: #6b7280; font-size: 12px; line-height: 1.6; }
  .stale { color: #b45309; font-size: 11px; }
</style>
</head>
<body>
  <div class="header">
    <div class="toprow">
      <span id="host">…</span>
      <span id="verdict" class="unknown" data-i18n="detecting">…</span>
    </div>
    <div class="meta" id="chain-row" style="display:none">
      <span>⛓</span><span id="chain"></span>
      <span class="right" id="delay"></span>
    </div>
    <div class="meta" id="rule-row" style="display:none">
      <span>☰</span><span id="rule"></span>
      <span class="right" id="traffic"></span>
    </div>
    <div class="meta" id="stale-row" style="display:none">
      <span class="stale" data-i18n="cached"></span>
    </div>
  </div>

  <div class="section" id="switch-sec" style="display:none">
    <div class="sec-head"><span id="group-label"></span></div>
    <div class="switch-row">
      <select id="node-select"></select>
      <button id="switch-btn" class="primary" style="flex:0 0 64px" data-i18n="switchBtn"></button>
    </div>
  </div>

  <div class="section" id="domains-sec" style="display:none">
    <div class="sec-head">
      <span id="dom-title"></span>
      <span id="dom-counts"></span>
    </div>
    <div class="bar" id="bar"></div>
    <div class="dom-list" id="dom-list"></div>
  </div>

  <div class="section hint" id="hint" style="display:none"></div>

  <div class="footer">
    <button id="open-dash" data-i18n="openDash"></button>
    <button id="refresh" data-i18n="refresh"></button>
  </div>

  <details>
    <summary data-i18n="settingsTitle"></summary>
    <div class="settings">
      <label data-i18n="controllerLabel"></label>
      <input id="controller" placeholder="http://192.168.10.1:9090">
      <label data-i18n="secretLabel"></label>
      <input id="secret" type="password">
      <div class="btns">
        <button id="test" data-i18n="testBtn"></button>
        <button id="save" data-i18n="saveBtn"></button>
      </div>
      <div id="msg"></div>
    </div>
  </details>
  <script src="popup.js"></script>
</body>
</html>

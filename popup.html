<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root { color-scheme: light dark; }
  html { background: transparent; }
  body {
    width: 340px;
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: #1f2937;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(14px) saturate(135%);
    -webkit-backdrop-filter: blur(14px) saturate(135%);
  }
  .header { padding: 14px 16px 12px; border-bottom: 1px solid #e5e7eb; }
  .toprow { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #host { font-weight: 600; font-size: 14px; word-break: break-all; }
  #verdict {
    padding: 3px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  #verdict.direct { background: #dcfce7; color: #166534; }
  #verdict.proxy { background: #dbeafe; color: #1e40af; }
  #verdict.block { background: #fee2e2; color: #991b1b; }
  #verdict.unknown { background: #f3f4f6; color: #6b7280; }
  #verdict.error { background: #fee2e2; color: #991b1b; }
  .meta { margin-top: 8px; display: flex; align-items: center; gap: 6px; color: #6b7280; font-size: 12px; }
  .meta .right { margin-left: auto; }
  .delay-ok { color: #16a34a; }
  .delay-bad { color: #d97706; }
  .section { padding: 12px 16px; }
  .sec-head { display: flex; justify-content: space-between; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: #f3f4f6; margin-bottom: 10px; }
  .bar .p { background: #2563eb; }
  .bar .d { background: #16a34a; }
  .bar .b { background: #dc2626; }
  .bar .u { background: #d1d5db; }
  .dom-table-wrap { max-height: 180px; overflow-y: auto; }
  .dom-table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 12px; }
  .dom-table col:nth-child(1) { width: auto; }
  .dom-table col:nth-child(2) { width: 72px; }
  .dom-table col:nth-child(3) { width: 72px; }
  .dom-table th {
    position: sticky; top: 0; z-index: 1; padding: 3px 0 5px;
    color: #9ca3af; background: #fff; font-weight: 500; text-align: left;
    border-bottom: 1px solid #e5e7eb;
  }
  .dom-table th:last-child { text-align: right; }
  .dom {
    color: #4b5563;
  }
  .dom td { padding: 4px 0; vertical-align: middle; }
  .dom td + td { padding-left: 8px; }
  .dom .h, .dom .o { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dom .o { font-weight: 500; }
  .dom .o.direct { color: #16a34a; }
  .dom .o.proxy { color: #2563eb; }
  .dom .o.block { color: #dc2626; }
  .dom .o.unknown { color: #9ca3af; }
  .dom .duration { color: #6b7280; white-space: nowrap; text-align: right; }
  .footer { padding: 10px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; }
  button {
    flex: 1; padding: 6px 0; border: 1px solid #d1d5db; background: #fff;
    border-radius: 6px; cursor: pointer; font-size: 12px; color: #1f2937;
  }
  button:hover { background: #f3f4f6; }
  button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
  button.primary:hover { background: #1d4ed8; }
  details { padding: 0 16px 12px; }
  summary { cursor: pointer; color: #6b7280; font-size: 12px; padding-top: 8px; }
  .settings label { display: block; margin: 6px 0 2px; color: #4b5563; font-size: 12px; }
  .settings input, .settings select {
    width: 100%; box-sizing: border-box; padding: 5px 8px;
    border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px;
  }
  .btns { margin-top: 8px; display: flex; gap: 8px; }
  #msg { margin-top: 6px; font-size: 12px; min-height: 16px; }
  #msg.ok { color: #16a34a; }
  #msg.err { color: #dc2626; }
  .hint { color: #6b7280; font-size: 12px; line-height: 1.6; }
  .stale { color: #b45309; font-size: 11px; }
  .update-notice {
    position: relative; padding: 10px 42px 10px 16px; border-bottom: 1px solid #bfdbfe;
    background: #eff6ff; color: #1e3a8a; font-size: 12px; line-height: 1.5;
  }
  .update-notice strong { display: block; margin-bottom: 2px; font-size: 13px; }
  .update-notice button {
    position: absolute; top: 8px; right: 10px; width: 26px; height: 26px; padding: 0;
    border: 0; background: transparent; color: inherit; font-size: 18px; line-height: 1;
  }
  .settings-version { margin-left: 4px; color: #9ca3af; }

  @media (prefers-color-scheme: dark) {
    body { color: #e5e7eb; background: rgba(24, 24, 27, 0.94); }
    .header, .footer, .dom-table th { border-color: #3f3f46; }
    .meta, .sec-head, summary, .hint, .dom .duration { color: #a1a1aa; }
    .dom-table th { color: #71717a; background: rgba(24, 24, 27, 0.96); }
    .dom { color: #d4d4d8; }
    .bar { background: #3f3f46; }
    .bar .u { background: #52525b; }
    #verdict.direct { background: rgba(22, 101, 52, 0.45); color: #86efac; }
    #verdict.proxy { background: rgba(30, 64, 175, 0.45); color: #93c5fd; }
    #verdict.block, #verdict.error { background: rgba(153, 27, 27, 0.45); color: #fca5a5; }
    #verdict.unknown { background: #3f3f46; color: #d4d4d8; }
    button { color: #e5e7eb; background: rgba(39, 39, 42, 0.82); border-color: #52525b; }
    button:hover { background: #3f3f46; }
    button.primary { color: #fff; background: #2563eb; border-color: #2563eb; }
    button.primary:hover { background: #1d4ed8; }
    .settings label { color: #d4d4d8; }
    .settings input, .settings select { color: #e5e7eb; background: rgba(39, 39, 42, 0.82); border-color: #52525b; }
    .delay-ok, .dom .o.direct { color: #4ade80; }
    .delay-bad, .stale { color: #fbbf24; }
    .dom .o.proxy { color: #60a5fa; }
    .dom .o.block { color: #f87171; }
    .dom .o.unknown { color: #71717a; }
    .update-notice { color: #dbeafe; background: #172554; border-color: #1e3a8a; }
  }
</style>
</head>
<body>
  <div class="header">
    <div class="toprow">
      <span id="host">…</span>
      <span id="verdict" class="unknown" data-i18n="detecting">…</span>
    </div>
    <div class="meta" id="chain-row" style="display:none">
      <span>⛓</span><span id="chain"></span>
      <span class="right" id="delay"></span>
    </div>
    <div class="meta" id="rule-row" style="display:none">
      <span>☰</span><span id="rule"></span>
    </div>
    <div class="meta" id="stale-row" style="display:none">
      <span class="stale" data-i18n="cached"></span>
    </div>
  </div>

  <div class="update-notice" id="update-notice" style="display:none">
    <strong id="update-title"></strong>
    <span data-i18n="updateHighlights"></span>
    <button id="dismiss-update" type="button" data-i18n-title="dismiss" aria-label="Close">×</button>
  </div>

  <div class="section" id="domains-sec" style="display:none">
    <div class="sec-head">
      <span id="dom-title"></span>
      <span id="dom-counts"></span>
    </div>
    <div class="bar" id="bar"></div>
    <div class="dom-table-wrap">
      <table class="dom-table">
        <colgroup><col><col><col></colgroup>
        <thead>
          <tr>
            <th data-i18n="domain"></th>
            <th data-i18n="route"></th>
            <th data-i18n="duration"></th>
          </tr>
        </thead>
        <tbody id="dom-list"></tbody>
      </table>
    </div>
  </div>

  <div class="section hint" id="hint" style="display:none"></div>

  <div class="footer">
    <button id="open-dash" data-i18n="openDash"></button>
    <button id="open-help" data-i18n="help"></button>
    <button id="refresh" data-i18n="refresh"></button>
  </div>

  <details id="settings-details">
    <summary><span data-i18n="settingsTitle"></span><span class="settings-version" id="version"></span></summary>
    <div class="settings">
      <label for="language" data-i18n="languageLabel"></label>
      <select id="language">
        <option value="auto" data-i18n="languageAuto"></option>
        <option value="zh_CN" data-i18n="languageChinese"></option>
        <option value="zh_TW" data-i18n="languageTraditionalChinese"></option>
        <option value="ja" data-i18n="languageJapanese"></option>
        <option value="en" data-i18n="languageEnglish"></option>
      </select>
      <label data-i18n="controllerLabel"></label>
      <input id="controller" placeholder="http://192.168.10.1:9090">
      <label data-i18n="secretLabel"></label>
      <input id="secret" type="password">
      <label data-i18n="dashboardLabel"></label>
      <input id="dashboard" placeholder="http://192.168.10.1:9090/ui/">
      <div class="hint" data-i18n="dashboardSettingHelp"></div>
      <div class="btns">
        <button id="test" data-i18n="testBtn"></button>
        <button id="save" data-i18n="saveBtn"></button>
      </div>
      <div id="msg"></div>
    </div>
  </details>
  <script src="popup.js"></script>
</body>
</html>
